apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-vite
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-vite
  template:
    metadata:
      labels:
        app: my-vite
    spec:
      containers:
        - name: web
          image: my-vite:1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: my-vite-svc
spec:
  selector:
    app: my-vite
  ports:
    - port: 80
      targetPort: 80
